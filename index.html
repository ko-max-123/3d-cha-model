<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D CAPTCHA 実験</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      width: 100%;
      height: 100%;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    body.model-active {
      position: fixed;
      inset: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
    }
    #container {
      width: 100vw;
      height: 100dvh;
      max-width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .pre-screen,
    #start-screen {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
      overflow: auto;
    }
    .panel {
      width: min(92vw, 520px);
      text-align: left;
    }
    .panel h1 {
      font-size: 1.5rem;
      margin: 0 0 16px;
      text-align: center;
    }
    .panel p {
      line-height: 1.6;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 14px 0;
    }
    .field label {
      font-weight: bold;
    }
    select {
      touch-action: manipulation;
      font-size: 1rem;
      padding: 10px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      background: #fff;
    }
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .radio-group label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-weight: normal;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px 10px;
    }
    .radio-group input {
      width: auto;
      margin: 0;
    }
    .status-message {
      min-height: 1.4em;
      font-size: 0.95rem;
      color: #555;
      text-align: center;
    }
    .status-message.error {
      color: #c62828;
    }
    #start-screen,
    #survey-screen,
    #post-survey-screen {
      display: none;
    }
    #post-survey-screen.pre-screen {
      justify-content: flex-start;
      align-items: center;
      height: 100dvh;
      min-height: 0;
      padding-top: max(36px, calc(env(safe-area-inset-top) + 24px));
      padding-bottom: max(36px, calc(env(safe-area-inset-bottom) + 24px));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #postSurveyForm {
      flex: 0 0 auto;
      margin: 0 auto;
      padding-bottom: 32px;
    }
    #main-screen {
      display: none;
      flex-direction: column;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
    }
    #threejs-container {
      width: 100vw;
      height: 60vh; /* 画面上部の5分の3 */
      height: 60dvh;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      user-select: none;
    }
    #input-area {
      height: 40vh; /* 画面下部の5分の2 */
      height: 40dvh;
      width: 100vw;
      max-width: 100vw;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding-top: 5vh;
      overflow: hidden;
    }
    h2 {
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      margin: 10px 0;
    }
    #result {
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      margin: 10px 0;
      display: none;
    }
    #correctAnswer {
      font-size: 1rem;
      color: red;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
      display: none;
    }
    input, textarea {
      touch-action: manipulation;
      font-size: 1rem;
      padding: 10px;
      width: 80%;
      max-width: 300px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin: 8px 0;
      box-sizing: border-box;
      text-align: center;
    }
    .radio-group input {
      width: auto;
      max-width: none;
      padding: 0;
      margin: 0;
    }
    textarea {
      height: 100px;
    }
    button {
      touch-action: manipulation;
      font-size: 1rem;
      padding: 8px 16px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      margin: 8px 0;
      min-width: 100px;
      width: auto;
    }
    button:hover {
      background-color: #0056b3;
    }
    .link-button {
      display: inline-block;
      font-size: 0.95rem;
      color: #007bff;
      text-decoration: none;
      margin-top: 10px;
    }
    .link-button:hover {
      text-decoration: underline;
    }
    #feedback,
    #finishButton,
    #result,
    #correctAnswer {
      display: none;
    }
    #thank-you {
      display: none;
      width: 100vw;
      height: 100dvh;
      background-color: #ffffff;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
    }
  </style>
  <script type="module" crossorigin src="./assets/main-DbgEgNjS.js"></script>
</head>
<body>
  <div id="container">
    <div id="consent-screen" class="pre-screen">
      <div class="panel">
        <h1>研究アンケート</h1>
        <p>
          このアンケートは、スマートフォン上で3D CAPTCHAをどのように操作するかを調査するためのものです。
          年代などの回答、テスト条件、認証結果、所要時間を研究分析のために記録します。
        </p>
        <p>
          アンケート回答とテスト結果の記録に同意いただける場合のみ、次へ進んでください。
        </p>
        <div style="text-align: center;">
          <button id="agreeButton" type="button">同意する</button>
        </div>
      </div>
    </div>

    <div id="survey-screen" class="pre-screen">
      <form id="surveyForm" class="panel">
        <h1>参加者アンケート</h1>
        <div class="field">
          <label for="ageGroup">年代</label>
          <select id="ageGroup" name="ageGroup" required>
            <option value="">選択してください</option>
            <option value="under_20">20歳未満</option>
            <option value="20s">20代</option>
            <option value="30s">30代</option>
            <option value="40s">40代</option>
            <option value="50s">50代</option>
            <option value="60_or_over">60歳以上</option>
            <option value="prefer_not_to_answer">回答しない</option>
          </select>
        </div>
        <div class="field">
          <label for="gender">性別</label>
          <select id="gender" name="gender" required>
            <option value="">選択してください</option>
            <option value="female">女性</option>
            <option value="male">男性</option>
            <option value="non_binary">ノンバイナリー</option>
            <option value="prefer_not_to_answer">回答しない</option>
          </select>
        </div>
        <div class="field">
          <label for="smartphoneExperience">スマホ操作歴</label>
          <select id="smartphoneExperience" name="smartphoneExperience" required>
            <option value="">選択してください</option>
            <option value="less_than_1_year">1年未満</option>
            <option value="1_to_3_years">1年以上3年未満</option>
            <option value="3_to_5_years">3年以上5年未満</option>
            <option value="5_to_10_years">5年以上10年未満</option>
            <option value="10_or_more_years">10年以上</option>
          </select>
        </div>
        <div class="field">
          <label for="gameExperience">ゲーム経験歴</label>
          <select id="gameExperience" name="gameExperience" required>
            <option value="">選択してください</option>
            <option value="none">なし</option>
            <option value="rarely">ほとんどない</option>
            <option value="sometimes">時々ある</option>
            <option value="often">よくある</option>
            <option value="daily">毎日</option>
          </select>
        </div>
        <div style="text-align: center;">
          <button id="surveySubmitButton" type="submit">アンケート入力完了</button>
        </div>
        <div id="surveyStatus" class="status-message"></div>
      </form>
    </div>

    <div id="start-screen">
      <div style="text-align: center;">
        <button id="startButton">開始</button>
        <br />
        <!-- <a class="link-button" href="./analyzer.html" hidden>操作ログを解析</a> -->
      </div>
    </div>

    <div id="main-screen">
      <div id="threejs-container"></div>
      <div id="input-area">
        <h2 id="instruction">見えた文字を入力してください</h2>
        <input type="text" id="userInput" />
        <button id="submitButton">送信</button>
        <div id="result"></div>
        <div id="correctAnswer"></div>
        <textarea id="feedback" placeholder="任意の感想"></textarea>
        <button id="finishButton">終了</button>
      </div>
    </div>

    <div id="post-survey-screen" class="pre-screen">
      <form id="postSurveyForm" class="panel">
        <h1>テスト後アンケート</h1>
        <div class="field">
          <label for="easyToUse">やりやすいと思いますか？</label>
          <select id="easyToUse" name="easyToUse" required>
            <option value="">選択してください</option>
            <option value="5">5（そう思う）</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1（そう思わない）</option>
          </select>
        </div>
        <div class="field">
          <label for="hardToUse">やりにくいと思いますか？</label>
          <select id="hardToUse" name="hardToUse" required>
            <option value="">選択してください</option>
            <option value="5">5（そう思う）</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1（そう思わない）</option>
          </select>
        </div>
        <div class="field">
          <label for="fun">楽しいですか？</label>
          <select id="fun" name="fun" required>
            <option value="">選択してください</option>
            <option value="5">5（そう思う）</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1（そう思わない）</option>
          </select>
        </div>
        <div class="field">
          <label for="difficulty">難易度はどのくらいでしたか？</label>
          <select id="difficulty" name="difficulty" required>
            <option value="">選択してください</option>
            <option value="5">5（難しい）</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1（易しい）</option>
          </select>
        </div>
        <div class="field">
          <label>ストレスを感じましたか？</label>
          <div class="radio-group">
            <label><input type="radio" name="stress" value="yes" required />はい</label>
            <label><input type="radio" name="stress" value="no" />いいえ</label>
          </div>
        </div>
        <div class="field">
          <label>再度利用したいですか？</label>
          <div class="radio-group">
            <label><input type="radio" name="useAgain" value="yes" required />はい</label>
            <label><input type="radio" name="useAgain" value="no" />いいえ</label>
          </div>
        </div>
        <div class="field">
          <label>セキュリティ上役に立つと思いますか？</label>
          <div class="radio-group">
            <label><input type="radio" name="usefulForSecurity" value="yes" required />はい</label>
            <label><input type="radio" name="usefulForSecurity" value="no" />いいえ</label>
          </div>
        </div>
        <div class="field">
          <label for="satisfaction">検証してみて、満足しましたか？</label>
          <select id="satisfaction" name="satisfaction" required>
            <option value="">選択してください</option>
            <option value="5">5（そう思う）</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1（そう思わない）</option>
          </select>
        </div>
        <div style="text-align: center;">
          <button id="postSurveySubmitButton" type="submit">アンケートを送信</button>
        </div>
        <div id="postSurveyStatus" class="status-message"></div>
      </form>
    </div>

    <div id="thank-you">
      <div>ご協力ありがとうございました。</div>
      <button id="restartButton" type="button">最初に戻る</button>
    </div>
  </div>

  <script src="./app-config.js"></script>
  <script src="./model-answers.js"></script>
</body>
</html>
